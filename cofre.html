<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Cofre de Senhas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #4ade80;
    --danger: #f87171;
    --text: #e2e8f0;
    --muted: #7c8ba1;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 24px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .login-box .icon { font-size: 52px; margin-bottom: 12px; }
  .login-box h1 { font-size: 24px; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .input-wrap { position: relative; margin-bottom: 16px; }
  .input-wrap input {
    width: 100%;
    padding: 14px 46px 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px;
  }
  .btn {
    width: 100%; padding: 14px;
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }
  .btn.danger { background: var(--danger); }
  .btn.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 10px;
  }
  #login-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ── APP ── */
  #app-screen { display: none; width: 100%; max-width: 700px; padding: 24px 16px 80px; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .topbar h2 { font-size: 20px; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px;
    color: var(--text); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; gap: 6px;
    transition: background .2s;
  }
  .icon-btn:hover { background: var(--border); }
  .sync-status {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
  }
  .sync-dot.syncing { background: #facc15; animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* search */
  #search {
    width: 100%; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 15px;
    outline: none; margin-bottom: 16px; transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent); }

  /* cards */
  #cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--accent); }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title { font-weight: 600; font-size: 16px; }
  .card-actions { display: flex; gap: 8px; }
  .small-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 10px;
    color: var(--text); cursor: pointer; font-size: 12px;
    transition: background .2s;
  }
  .small-btn:hover { background: var(--border); }
  .small-btn.red { color: var(--danger); }
  .field-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 14px;
  }
  .field-label { color: var(--muted); min-width: 70px; }
  .field-value {
    flex: 1; background: var(--surface2);
    border-radius: 6px; padding: 4px 10px;
    font-family: monospace; font-size: 13px;
    word-break: break-all;
  }
  .copy-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 2px 4px;
    transition: color .2s;
  }
  .copy-btn:hover { color: var(--accent2); }
  .pw-masked { filter: blur(5px); transition: filter .2s; cursor: pointer; }
  .pw-masked:hover { filter: blur(0); }

  /* modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%; max-width: 460px;
  }
  .modal h3 { margin-bottom: 20px; font-size: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 11px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; }
  .pw-gen-row { display: flex; gap: 8px; }
  .pw-gen-row input { flex: 1; }

  /* toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 20px;
    font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity .3s; z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* fab */
  .fab {
    position: fixed; bottom: 28px; right: 24px;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent); border: none;
    color: #fff; font-size: 26px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(108,99,255,.5);
    transition: transform .2s;
  }
  .fab:hover { transform: scale(1.08); }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .e-icon { font-size: 48px; margin-bottom: 12px; }
  .category-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 20px; background: var(--surface2);
    color: var(--muted); margin-left: 8px;
  }

  /* setup screen */
  #setup-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px; width: 100%;
  }
  .setup-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px; width: 100%; max-width: 440px;
  }
  .setup-box h1 { font-size: 22px; margin-bottom: 8px; }
  .setup-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>

<!-- SETUP (primeira vez) -->
<div id="setup-screen">
  <div class="setup-box">
    <div style="font-size:48px;margin-bottom:12px">🔐</div>
    <h1>Criar Cofre</h1>
    <p>Primeira vez aqui! Crie uma senha mestra forte. Ela criptografa tudo — não tem como recuperar se esquecer.</p>
    <div class="form-group">
      <label>Senha mestra</label>
      <div class="input-wrap" style="margin-bottom:0">
        <input type="password" id="setup-pw1" placeholder="Mínimo 8 caracteres">
        <button class="toggle-pw" onclick="toggleVis('setup-pw1',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmar senha</label>
      <div class="input-wrap" style="margin-bottom:0">
        <input type="password" id="setup-pw2" placeholder="Repita a senha">
        <button class="toggle-pw" onclick="toggleVis('setup-pw2',this)">👁</button>
      </div>
    </div>
    <div id="setup-error" style="color:var(--danger);font-size:13px;margin:8px 0"></div>
    <button class="btn" onclick="doSetup()">Criar cofre</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="icon">🔐</div>
    <h1>Cofre de Senhas</h1>
    <p>Digite sua senha mestra para entrar</p>
    <div class="input-wrap">
      <input type="password" id="login-pw" placeholder="Senha mestra" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="toggle-pw" onclick="toggleVis('login-pw',this)">👁</button>
    </div>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div id="login-error"></div>
    <button class="btn ghost" onclick="showReset()">Esqueci a senha / resetar cofre</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div>
      <h2>🔐 Meu Cofre</h2>
      <div class="sync-status" id="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-text">Sincronizado</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="doSync()">🔄 Sync</button>
      <button class="icon-btn" onclick="doLogout()">🚪 Sair</button>
    </div>
  </div>
  <input type="text" id="search" placeholder="🔍 Buscar..." oninput="renderCards()">
  <div id="cards"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openModal()" style="display:none">+</button>

<!-- MODAL ADICIONAR/EDITAR -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Nova entrada</h3>
    <div class="form-group">
      <label>Nome / Site</label>
      <input type="text" id="f-name" placeholder="ex: Gmail, Netflix...">
    </div>
    <div class="form-group">
      <label>Usuário / Email</label>
      <input type="text" id="f-user" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <div class="pw-gen-row">
        <input type="text" id="f-pw" placeholder="senha">
        <button class="small-btn" onclick="genPw()">⚡ Gerar</button>
      </div>
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="text" id="f-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="f-cat">
        <option>Geral</option>
        <option>Email</option>
        <option>Redes Sociais</option>
        <option>Trabalho</option>
        <option>Banco</option>
        <option>Streaming</option>
        <option>Jogos</option>
        <option>Outro</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="f-notes" placeholder="Informações extras..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveEntry()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://bbapapibhovtkhfabhik.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiYXBhcGliaG92dGtoZmFiaGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjIxMzYsImV4cCI6MjA5ODMzODEzNn0.fsXRo5ETBCfYF3vbEPjzHFkl6fEwjUUMQWROZcBMWiE';
const USER_ID = 'cofre_principal'; // ID fixo (cofre pessoal)
const HASH_KEY = 'cofre_pw_hash';
const VERIFY_KEY = 'cofre_verify';

// ── STATE ────────────────────────────────────────────────
let masterKey = null;
let entries = [];
let editingId = null;

// ── CRYPTO ──────────────────────────────────────────────
function hashPw(pw) {
  return CryptoJS.SHA256(pw + 'cofre_salt_v1').toString();
}
function encrypt(data) {
  return CryptoJS.AES.encrypt(JSON.stringify(data), masterKey).toString();
}
function decrypt(cipher) {
  try {
    const bytes = CryptoJS.AES.decrypt(cipher, masterKey);
    return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
  } catch { return null; }
}

// ── SUPABASE API ─────────────────────────────────────────
async function sbGet() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/cofre?user_id=eq.${USER_ID}&select=*`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) return null;
  const rows = await r.json();
  return rows.length ? rows[0] : null;
}

async function sbUpsert(payload) {
  // check if row exists
  const existing = await sbGet();
  if (existing) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/cofre?user_id=eq.${USER_ID}`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', Prefer: 'return=minimal'
      },
      body: JSON.stringify({ payload, updated_at: new Date().toISOString() })
    });
    return r.ok;
  } else {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/cofre`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', Prefer: 'return=minimal'
      },
      body: JSON.stringify({ user_id: USER_ID, payload, updated_at: new Date().toISOString() })
    });
    return r.ok;
  }
}

// ── SYNC ─────────────────────────────────────────────────
function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  txt.textContent = state === 'syncing' ? 'Sincronizando...' : state === 'error' ? 'Erro de sync' : 'Sincronizado';
}

async function saveToCloud() {
  setSyncStatus('syncing');
  const payload = encrypt(entries);
  const ok = await sbUpsert(payload);
  setSyncStatus(ok ? 'ok' : 'error');
  if (!ok) toast('⚠️ Erro ao salvar na nuvem');
}

async function loadFromCloud() {
  setSyncStatus('syncing');
  const row = await sbGet();
  if (!row) { setSyncStatus('ok'); return false; }
  const data = decrypt(row.payload);
  if (!data) { setSyncStatus('error'); toast('❌ Senha incorreta ou dados corrompidos'); return false; }
  entries = data;
  setSyncStatus('ok');
  return true;
}

async function doSync() {
  await loadFromCloud();
  renderCards();
  toast('🔄 Sincronizado!');
}

// ── AUTH ─────────────────────────────────────────────────
function isFirstTime() {
  return !localStorage.getItem(HASH_KEY);
}

function doSetup() {
  const p1 = document.getElementById('setup-pw1').value;
  const p2 = document.getElementById('setup-pw2').value;
  const err = document.getElementById('setup-error');
  if (p1.length < 8) { err.textContent = 'Mínimo 8 caracteres'; return; }
  if (p1 !== p2) { err.textContent = 'As senhas não coincidem'; return; }
  localStorage.setItem(HASH_KEY, hashPw(p1));
  masterKey = p1;
  entries = [];
  saveToCloud();
  showApp();
}

async function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const stored = localStorage.getItem(HASH_KEY);
  if (hashPw(pw) !== stored) {
    document.getElementById('login-error').textContent = '❌ Senha incorreta';
    return;
  }
  masterKey = pw;
  document.getElementById('login-error').textContent = '';
  const ok = await loadFromCloud();
  if (!ok && entries.length === 0) {
    // sem dados na nuvem ainda, tudo bem
  }
  showApp();
}

function doLogout() {
  masterKey = null;
  entries = [];
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('fab').style.display = 'none';
  document.getElementById('login-pw').value = '';
  document.getElementById('login-screen').style.display = 'flex';
  toast('👋 Saiu com segurança');
}

function showReset() {
  if (!confirm('⚠️ Isso apagará TODAS as suas senhas locais. Confirma?')) return;
  localStorage.removeItem(HASH_KEY);
  location.reload();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('fab').style.display = 'flex';
  renderCards();
}

// ── CARDS ────────────────────────────────────────────────
function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = entries.filter(e =>
    (e.name||'').toLowerCase().includes(q) ||
    (e.user||'').toLowerCase().includes(q) ||
    (e.cat||'').toLowerCase().includes(q)
  );
  const c = document.getElementById('cards');
  if (filtered.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="e-icon">🔒</div><p>${entries.length===0?'Nenhuma senha ainda. Clique no + para adicionar!':'Nenhum resultado encontrado.'}</p></div>`;
    return;
  }
  c.innerHTML = filtered.map(e => `
    <div class="card">
      <div class="card-header">
        <span class="card-title">${esc(e.name)} <span class="category-tag">${esc(e.cat||'Geral')}</span></span>
        <div class="card-actions">
          <button class="small-btn" onclick="editEntry('${e.id}')">✏️ Editar</button>
          <button class="small-btn red" onclick="deleteEntry('${e.id}')">🗑</button>
        </div>
      </div>
      ${e.user ? `<div class="field-row"><span class="field-label">Usuário</span><span class="field-value">${esc(e.user)}</span><button class="copy-btn" onclick="cp('${esc(e.user)}')">📋</button></div>` : ''}
      ${e.pw ? `<div class="field-row"><span class="field-label">Senha</span><span class="field-value pw-masked" title="Clique para revelar">${esc(e.pw)}</span><button class="copy-btn" onclick="cp('${esc(e.pw)}')">📋</button></div>` : ''}
      ${e.url ? `<div class="field-row"><span class="field-label">URL</span><span class="field-value"><a href="${esc(e.url)}" target="_blank" style="color:var(--accent)">${esc(e.url)}</a></span></div>` : ''}
      ${e.notes ? `<div class="field-row"><span class="field-label">Notas</span><span class="field-value">${esc(e.notes)}</span></div>` : ''}
    </div>
  `).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── MODAL ────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Editar entrada' : 'Nova entrada';
  const e = id ? entries.find(x => x.id === id) : {};
  document.getElementById('f-name').value = e.name || '';
  document.getElementById('f-user').value = e.user || '';
  document.getElementById('f-pw').value = e.pw || '';
  document.getElementById('f-url').value = e.url || '';
  document.getElementById('f-cat').value = e.cat || 'Geral';
  document.getElementById('f-notes').value = e.notes || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

async function saveEntry() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('⚠️ Nome é obrigatório'); return; }
  const entry = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2),
    name,
    user: document.getElementById('f-user').value.trim(),
    pw: document.getElementById('f-pw').value,
    url: document.getElementById('f-url').value.trim(),
    cat: document.getElementById('f-cat').value,
    notes: document.getElementById('f-notes').value.trim(),
    updated: Date.now()
  };
  if (editingId) {
    const idx = entries.findIndex(x => x.id === editingId);
    entries[idx] = entry;
  } else {
    entries.unshift(entry);
  }
  closeModal();
  renderCards();
  await saveToCloud();
  toast('✅ Salvo!');
}

function editEntry(id) { openModal(id); }

async function deleteEntry(id) {
  if (!confirm('Apagar esta entrada?')) return;
  entries = entries.filter(x => x.id !== id);
  renderCards();
  await saveToCloud();
  toast('🗑 Apagado');
}

// ── UTILS ─────────────────────────────────────────────────
function genPw() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*';
  let pw = '';
  for (let i = 0; i < 18; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('f-pw').value = pw;
}

function cp(text) {
  navigator.clipboard.writeText(text).then(() => toast('📋 Copiado!'));
}

function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function toggleVis(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

// ── INIT ──────────────────────────────────────────────────
document.getElementById('login-screen').style.display = 'none';
if (isFirstTime()) {
  document.getElementById('setup-screen').style.display = 'flex';
} else {
  document.getElementById('login-screen').style.display = 'flex';
}

// fechar modal clicando fora
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
